<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>The Ambassador Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #c { position: fixed; inset: 0; }
    #c iframe { width: 100% !important; height: 100% !important; border: none; }
  </style>
</head>
<body>
<div id="c"></div>
<script>
  var p = new URLSearchParams(window.location.search);
  var vName = p.get('name'), vEmail = p.get('email'), vHash = p.get('hash');

  // Strip params from URL so Tawk dashboard shows only the base URL
  history.replaceState(null, '', window.location.pathname);

  window.Tawk_API = { embedded: 'c' };

  if (vName && vHash) {
    Tawk_API.onLoad = function() {
      var attrs = { name: vName, hash: vHash };
      if (vEmail) attrs.email = vEmail;
      Tawk_API.setAttributes(attrs, function(err) {
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(
          JSON.stringify({ type: 'tawk_log', msg: err ? 'err: ' + err : 'ok' })
        );
      });
    };
  }

  (function() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://embed.tawk.to/69ba899378528f1c35000cfb/1jk0aipu2';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
