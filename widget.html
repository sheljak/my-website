<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>The Ambassador Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #c { position: fixed; inset: 0; }
    #c iframe { width: 100% !important; height: 100% !important; border: none; }
  </style>
</head>
<body>
<div id="c"></div>
<script>
  window.Tawk_API = { embedded: 'c' };

  // Browser fallback: URL params
  var p = new URLSearchParams(window.location.search);
  var userId = p.get('userId');
  var hash   = p.get('hash');
  if (userId && hash) {
    Tawk_API.onLoad = function() {
      Tawk_API.login({
        hash:   hash,
        userId: userId,
        name:   p.get('name')  || '',
        email:  p.get('email') || '',
      }, function() {});
    };
  }

  (function() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://embed.tawk.to/69ba899378528f1c35000cfb/1jk0aipu2';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
