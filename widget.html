<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="description" content="The Ambassador Platform resources">
	<title>The Ambassador Platform | Resources1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #c { position: fixed; inset: 0; }
    #c iframe { width: 100% !important; height: 100% !important; border: none; }
  </style>
</head>
<body>
<div id="c"></div>
<script>
  var params = new URLSearchParams(window.location.search);
  var name   = params.get('name')   || '';
  var email  = params.get('email')  || '';
  var hash   = params.get('hash')   || '';
  var userId = params.get('userId') || '';

  window.Tawk_API = {};
  window.Tawk_API.embedded = 'c';

  if (hash && userId) {
    var _loggedIn = false;
    window.Tawk_API.onLoad = function() {
      if (_loggedIn) return;
      _loggedIn = true;
      var attrs = { hash: hash, userId: userId };
      if (name)  attrs.name  = name;
      if (email) attrs.email = email;
      window.Tawk_API.login(attrs);
    };
  }

  (function() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://embed.tawk.to/69ba899378528f1c35000cfb/1jk0aipu2';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
