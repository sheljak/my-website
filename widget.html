<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>The Ambassador Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #c { position: fixed; inset: 0; }
    #c iframe { width: 100% !important; height: 100% !important; border: none; }
  </style>
</head>
<body>
<div id="c"></div>
<script>
  window.Tawk_API = { embedded: 'c' };

  function log(msg, extra) {
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(
      JSON.stringify(Object.assign({ type: 'tawk_log', msg: msg }, extra || {}))
    );
  }

  function loginUser(data) {
    log('calling login', { userId: data.userId });
    Tawk_API.login(data, function(error) {
      if (error) { log('login error', { error: JSON.stringify(error) }); }
      else        { log('login success', { userId: data.userId }); }
    });
  }

  function updateAttributes(data) {
    log('setting attributes', { name: data.name });
    Tawk_API.setAttributes({ name: data.name, email: data.email }, function(error) {
      if (error) { log('setAttributes error', { error: JSON.stringify(error) }); }
      else        { log('setAttributes success'); }
    });
  }

  // Messages from React Native
  window.addEventListener('message', function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'tawk_login')           { loginUser(msg.data); }
      if (msg.type === 'tawk_set_attributes')  { updateAttributes(msg.data); }
    } catch(_) {}
  });

  // Browser fallback: URL params
  var p = new URLSearchParams(window.location.search);
  var userId = p.get('userId');
  if (userId && p.get('hash')) {
    Tawk_API.onLoad = function() {
      loginUser({ hash: p.get('hash'), userId: userId, name: p.get('name') || '' });
    };
  }

  (function() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://embed.tawk.to/69ba899378528f1c35000cfb/1jk0aipu2';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
