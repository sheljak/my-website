<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Help Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #c { position: fixed; inset: 0; }
    #c iframe { width: 100% !important; height: 100% !important; border: none; }
  </style>
</head>
<body>
<div id="c"></div>
<script>
  var params = new URLSearchParams(window.location.search);
  var name  = params.get('name')  || '';
  var email = params.get('email') || '';
  var hash  = params.get('hash')  || '';
  var userId = params.get('userId') || '';

  window.Tawk_API = {};
  window.Tawk_API.embedded = 'c';

  if (name || email) {
    window.Tawk_API.visitor = {};
    if (name)  window.Tawk_API.visitor.name  = name;
    if (email) window.Tawk_API.visitor.email = email;
    if (userId) window.Tawk_API.visitor.userId = userId;
    if (hash)  window.Tawk_API.visitor.hash  = hash;
  }

  (function() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://embed.tawk.to/69ba899378528f1c35000cfb/1jk0aipu2';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
