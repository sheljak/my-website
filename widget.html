<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>The Ambassador Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #c { position: fixed; inset: 0; }
    #c iframe { width: 100% !important; height: 100% !important; border: none; }
  </style>
</head>
<body>
<div id="c"></div>
<script>
  window.Tawk_API = { embedded: 'c' };

  // Set visitor identity from URL params before the Tawk script loads
  var p = new URLSearchParams(window.location.search);
  var vName = p.get('name'), vEmail = p.get('email'), vHash = p.get('hash');
  if (vName) {
    Tawk_API.visitor = Object.assign(
      { name: vName, hash: vHash || '' },
      vEmail ? { email: vEmail } : {}
    );
  }

  function log(msg, extra) {
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(
      JSON.stringify(Object.assign({ type: 'tawk_log', msg: msg }, extra || {}))
    );
  }

  (function() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://embed.tawk.to/69ba899378528f1c35000cfb/1jk0aipu2';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
